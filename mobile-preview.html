<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>健康守护者 · 移动端演示</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    *,*::before,*::after { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 80% 10%, rgba(26,157,138,0.12) 0%, transparent 50%),
        radial-gradient(circle at 15% 90%, rgba(44,111,181,0.08) 0%, transparent 50%),
        linear-gradient(180deg, #EEF3EF 0%, #DEE6E2 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      padding: 24px;
      gap: 10px;
    }
    .hero {
      text-align: center;
      max-width: 540px;
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #0C7264;
      font-size: 10.5px;
      font-weight: 800;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .eyebrow::before {
      content: '';
      display: inline-block;
      width: 22px;
      height: 1.5px;
      background: #0C7264;
      opacity: 0.5;
    }
    .title {
      color: #1A1C20;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 0.4px;
      margin: 0 0 4px;
    }
    .hint  {
      color: #6F7585;
      font-size: 12.5px;
      margin: 0;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: #FFFFFF;
      border: 1px solid #DEE6E2;
      padding: 6px 12px;
      border-radius: 999px;
      margin-top: 10px;
      font-size: 12px;
      font-weight: 700;
      color: #3E4350;
    }
    .status .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #D6921E;
      box-shadow: 0 0 0 3px rgba(214,146,30,0.20);
    }
    .status.live .dot { background: #0C7264; box-shadow: 0 0 0 3px rgba(12,114,100,0.20); }
    .status.live .lbl { color: #0C7264; }
    .toolbar { display: flex; gap: 10px; margin: 8px 0 0; }
    .btn {
      background: #FFFFFF;
      border: 1px solid #DEE6E2;
      color: #1A1C20;
      font-size: 12.5px;
      font-weight: 700;
      padding: 8px 14px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn:hover { background: #F8FAFC; transform: translateY(-1px); }
    .btn.primary {
      background: linear-gradient(135deg, #0C7264 0%, #085A50 100%);
      border-color: #085A50;
      color: #FFFFFF;
      box-shadow: 0 6px 14px rgba(12,114,100,0.30);
    }
    .btn.primary:hover { transform: translateY(-1px); box-shadow: 0 10px 20px rgba(12,114,100,0.35); }

    .frame {
      width: 432px;
      height: 935px;
      border-radius: 50px;
      background: #1A1C20;
      padding: 10px;
      box-shadow:
        0 0 0 2px #2C2E36,
        0 30px 80px rgba(26,28,32,0.30),
        0 6px 16px rgba(26,28,32,0.12);
      position: relative;
      flex-shrink: 0;
      margin-top: 14px;
    }
    .notch {
      position: absolute; top: 20px; left: 50%;
      transform: translateX(-50%);
      width: 130px; height: 28px;
      border-radius: 14px;
      background: #0A0F17;
      z-index: 2;
    }
    .indicator {
      position: absolute; bottom: 18px; left: 50%;
      transform: translateX(-50%);
      width: 124px; height: 5px;
      border-radius: 999px;
      background: rgba(255,255,255,0.32);
      z-index: 2;
    }
    .screen {
      width: 100%; height: 100%;
      border-radius: 40px;
      background: #EEF3EF;
      overflow: hidden;
      position: relative;
    }
    iframe { width: 100%; height: 100%; border: 0; display: block; }
    .offline {
      position: absolute; inset: 0;
      display: none;
      flex-direction: column; align-items: center; justify-content: center;
      padding: 32px;
      text-align: center;
      background: #EEF3EF;
      z-index: 3;
    }
    .offline.show { display: flex; }
    .offline svg { margin-bottom: 18px; }
    .offline h2 { color: #1A1C20; font-size: 18px; margin: 0 0 8px; }
    .offline p { color: #6F7585; font-size: 13px; line-height: 21px; margin: 0; max-width: 280px; }
    .offline code { background: #FBF6E9; padding: 2px 6px; border-radius: 4px; color: #0C7264; font-weight: 700; font-size: 12px; }
    .footer {
      color: #A8AEBC;
      font-size: 11.5px;
      margin-top: 4px;
      text-align: center;
      max-width: 460px;
      line-height: 18px;
    }
  </style>
</head>
<body>
  <div class="hero">
    <span class="eyebrow">DEMO PREVIEW</span>
    <h1 class="title">健康守护者 · 移动端演示</h1>
    <p class="hint">在右侧手机里直接点击操作 · 已预填演示账号一键登录</p>
    <div id="status" class="status">
      <span class="dot"></span>
      <span class="lbl">检查服务中…</span>
    </div>
    <div class="toolbar">
      <button class="btn primary" onclick="reloadApp()">重新加载</button>
      <button class="btn" onclick="window.open('http://localhost:8081','_blank')">新标签打开</button>
    </div>
  </div>

  <div class="frame">
    <div class="notch"></div>
    <div class="screen">
      <iframe id="app" src="http://localhost:8081" allow="clipboard-read; clipboard-write"></iframe>
      <div id="offline" class="offline">
        <svg width="56" height="56" viewBox="0 0 56 56" fill="none">
          <circle cx="28" cy="28" r="26" stroke="#E0594E" stroke-width="2.5" fill="#FDE5E5" />
          <path d="M28 16 L28 32" stroke="#E0594E" stroke-width="3" stroke-linecap="round" />
          <circle cx="28" cy="40" r="2.5" fill="#E0594E" />
        </svg>
        <h2>Metro 服务未运行</h2>
        <p>双击项目根目录的 <code>演示.bat</code>，<br>或在终端运行 <code>npm run demo</code>，<br>等待 10 秒后刷新此页面即可。</p>
      </div>
    </div>
    <div class="indicator"></div>
  </div>

  <p class="footer">
    Storage 兜底层：localStorage 被拒时自动落到内存，演示永远可登录。<br>
    如需清空：开发者工具 → Application → Local Storage 删除 localhost:8081 条目刷新即可。
  </p>

  <script>
    const statusEl = document.getElementById('status');
    const offlineEl = document.getElementById('offline');
    const iframe = document.getElementById('app');

    async function checkMetro() {
      try {
        await fetch('http://localhost:8081', { mode: 'no-cors', cache: 'no-store' });
        statusEl.classList.add('live');
        statusEl.querySelector('.lbl').textContent = 'Metro 在线 · localhost:8081';
        offlineEl.classList.remove('show');
        return true;
      } catch (e) {
        statusEl.classList.remove('live');
        statusEl.querySelector('.lbl').textContent = 'Metro 未连接，请双击 演示.bat 启动';
        offlineEl.classList.add('show');
        return false;
      }
    }

    function reloadApp() {
      iframe.src = iframe.src;
      checkMetro();
    }

    // 初次检查
    checkMetro();
    // 每 4 秒重检，启动期间自动恢复
    setInterval(checkMetro, 4000);
  </script>
</body>
</html>
