<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0F8F93" />
  <title>健康守护者</title>
  <style>
    :root {
      --bg: #f3f6fa;
      --surface: #ffffff;
      --surface-2: #f8fafc;
      --text: #122033;
      --muted: #66758a;
      --line: #e0e8f0;
      --primary: #0f8f93;
      --primary-2: #13a4a8;
      --navy: #172a46;
      --blue: #2f80ed;
      --green: #2eac6d;
      --yellow: #f2a93b;
      --red: #d84e4e;
      --purple: #6b65d8;
      --cyan-soft: #e9f8f8;
      --green-soft: #eaf8f0;
      --yellow-soft: #fff4dc;
      --red-soft: #fff0f0;
      --purple-soft: #f0efff;
      --shadow: 0 14px 34px rgba(18, 32, 51, .08);
      --shadow-soft: 0 8px 22px rgba(18, 32, 51, .06);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: #dfe7ef; color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
    body { -webkit-tap-highlight-color: transparent; }
    button, input, select, textarea { font: inherit; }
    button { border: 0; cursor: pointer; }
    .app { width: min(100vw, 390px); min-height: 100vh; height: 100vh; background: var(--bg); overflow: hidden; }
    .screen { width: 100%; height: calc(100vh - 92px - env(safe-area-inset-bottom)); margin: 0; padding: 16px 16px 18px; overflow-y: auto; overflow-x: hidden; overscroll-behavior: contain; }
    .login-screen { width: min(100vw, 390px); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 22px 18px; background: radial-gradient(circle at 20% 0%, #e7fbfb 0, transparent 34%), var(--bg); }
    .login-wrap { width: 100%; }
    .brand { text-align: center; margin-bottom: 20px; }
    .brand-mark { width: 84px; height: 84px; margin: 0 auto 14px; border-radius: 8px; display: grid; place-items: center; color: #fff; background: linear-gradient(135deg, var(--primary), var(--green)); box-shadow: var(--shadow); }
    .brand h1 { margin: 0; font-size: 31px; font-weight: 950; letter-spacing: 0; }
    .brand p { margin: 8px 0 0; color: var(--muted); font-size: 14px; line-height: 1.45; }
    .card { background: var(--surface); border: 1px solid #edf2f6; border-radius: 8px; padding: 16px; margin-bottom: 13px; box-shadow: var(--shadow-soft); overflow: hidden; }
    .glass-card { background: rgba(255,255,255,.92); border: 1px solid rgba(255,255,255,.82); }
    .field { margin-bottom: 12px; }
    label { display: block; color: var(--text); font-size: 13px; font-weight: 900; margin-bottom: 8px; }
    input, select, textarea { width: 100%; min-height: 48px; border-radius: 8px; border: 1px solid var(--line); background: var(--surface-2); color: var(--text); outline: none; padding: 12px; }
    textarea { min-height: 92px; resize: vertical; line-height: 1.55; }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(15,143,147,.12); background: #fff; }
    .btn { min-height: 46px; width: 100%; border-radius: 8px; padding: 0 13px; background: var(--primary); color: #fff; font-weight: 950; display: inline-flex; align-items: center; justify-content: center; gap: 7px; white-space: nowrap; }
    .btn:active, .icon-btn:active, .nav button:active, .chip:active, .quick:active { transform: scale(.985); }
    .btn.ghost { background: #fff; color: var(--text); border: 1px solid var(--line); }
    .btn.green { background: var(--green); }
    .btn.red { background: var(--red); }
    .btn.yellow { background: var(--yellow); }
    .btn.small { min-height: 36px; font-size: 12px; padding: 0 10px; }
    .actions { display: grid; grid-template-columns: repeat(auto-fit, minmax(92px, 1fr)); gap: 8px; margin-top: 14px; }
    .actions.tight { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .icon { width: 22px; height: 22px; display: block; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex: 0 0 auto; }
    .brand-mark .icon { width: 48px; height: 48px; }
    .icon.lg { width: 32px; height: 32px; }
    .icon-btn { width: 44px; height: 44px; border-radius: 8px; display: grid; place-items: center; color: var(--primary); background: #fff; border: 1px solid var(--line); box-shadow: var(--shadow-soft); }
    .app-header { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin: 2px 0 14px; }
    .kicker { color: var(--muted); font-size: 13px; margin-bottom: 4px; }
    h2, h3, p { margin-top: 0; }
    .app-header h2, .page-head h2 { margin: 0; font-size: 24px; font-weight: 950; letter-spacing: 0; }
    .page-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin: 2px 0 14px; }
    .page-head p { margin: 5px 0 0; color: var(--muted); font-size: 13px; line-height: 1.45; }
    .hero { position: relative; min-height: 178px; padding: 18px; border-radius: 8px; overflow: hidden; color: #fff; background: linear-gradient(135deg, #172a46 0%, #0f8f93 72%, #2eac6d 100%); box-shadow: var(--shadow); margin-bottom: 14px; }
    .hero:after { content: ""; position: absolute; width: 190px; height: 190px; right: -68px; top: -52px; border-radius: 50%; background: rgba(255,255,255,.12); }
    .hero:before { content: ""; position: absolute; width: 160px; height: 160px; right: 26px; bottom: -98px; border-radius: 50%; border: 24px solid rgba(255,255,255,.08); }
    .hero-content { position: relative; z-index: 1; }
    .hero small { display: block; color: #b7e7e7; font-size: 13px; font-weight: 900; margin-bottom: 8px; }
    .hero h1 { margin: 0; max-width: 270px; font-size: 24px; line-height: 1.32; letter-spacing: 0; }
    .hero p { max-width: 276px; color: rgba(255,255,255,.78); font-size: 13px; line-height: 1.6; margin: 10px 0 0; }
    .hero-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 16px; }
    .hero-stat { background: rgba(255,255,255,.13); border: 1px solid rgba(255,255,255,.16); border-radius: 8px; padding: 10px; }
    .hero-stat strong { display: block; font-size: 18px; }
    .hero-stat span { display: block; color: rgba(255,255,255,.72); font-size: 11px; margin-top: 2px; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .metric { min-height: 132px; margin-bottom: 0; }
    .metric strong { display: block; margin-top: 12px; font-size: 26px; line-height: 1; }
    .metric span { display: block; margin-top: 6px; font-size: 13px; font-weight: 900; }
    .metric small { display: block; margin-top: 4px; color: var(--muted); font-size: 12px; }
    .bubble { width: 42px; height: 42px; border-radius: 8px; display: grid; place-items: center; background: var(--cyan-soft); color: var(--primary); flex: 0 0 auto; }
    .section { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin: 18px 0 10px; }
    .section h3 { margin: 0; font-size: 18px; font-weight: 950; letter-spacing: 0; }
    .section p { margin: 3px 0 0; color: var(--muted); font-size: 12px; line-height: 1.45; }
    .text-action { background: transparent; color: var(--primary); font-size: 13px; font-weight: 950; padding: 8px 0 8px 10px; white-space: nowrap; }
    .quick { width: 100%; text-align: left; background: #fff; border: 1px solid #edf2f6; border-radius: 8px; padding: 15px; box-shadow: var(--shadow-soft); }
    .quick .title { margin-top: 12px; }
    .row { display: flex; align-items: center; gap: 12px; }
    .space { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .grow { flex: 1; min-width: 0; }
    .title { color: var(--text); font-size: 16px; font-weight: 950; line-height: 1.35; overflow-wrap: anywhere; }
    .meta { color: var(--muted); font-size: 12px; line-height: 1.5; margin-top: 4px; }
    .badge { display: inline-flex; align-items: center; gap: 4px; min-height: 28px; border-radius: 999px; padding: 5px 10px; color: var(--green); background: var(--green-soft); font-size: 12px; font-weight: 950; white-space: nowrap; }
    .badge.warn { color: #b07608; background: var(--yellow-soft); }
    .badge.off { color: var(--muted); background: #eef2f6; }
    .task { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #eef3f7; background: transparent; width: 100%; text-align: left; }
    .task:last-child { border-bottom: 0; }
    .check { width: 25px; height: 25px; border-radius: 50%; border: 2px solid var(--line); color: #fff; display: grid; place-items: center; flex: 0 0 auto; }
    .check.done { background: var(--primary); border-color: var(--primary); }
    .info-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin-top: 13px; }
    .info { padding: 11px; background: var(--surface-2); border: 1px solid #edf2f6; border-radius: 8px; }
    .info span { display: block; color: var(--muted); font-size: 12px; margin-bottom: 5px; }
    .info strong { display: block; color: var(--text); font-size: 13px; font-weight: 950; overflow-wrap: anywhere; }
    .progress { height: 8px; border-radius: 999px; overflow: hidden; background: #e7edf3; }
    .progress i { display: block; height: 100%; border-radius: 999px; background: var(--primary); }
    .tabs { display: flex; overflow-x: auto; gap: 8px; padding: 2px 0 13px; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab { height: 38px; border-radius: 999px; padding: 0 14px; background: #fff; border: 1px solid var(--line); color: var(--muted); font-size: 13px; font-weight: 950; white-space: nowrap; }
    .tab.active { color: #fff; background: var(--primary); border-color: var(--primary); box-shadow: 0 8px 18px rgba(15,143,147,.2); }
    .game-card { padding: 0; overflow: hidden; }
    .game-top { padding: 16px; }
    .game-pad { min-height: 176px; margin: 0; padding: 26px 16px; color: #fff; background: linear-gradient(135deg, var(--primary), var(--blue)); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; user-select: none; }
    .game-pad .icon { width: 54px; height: 54px; margin-bottom: 12px; }
    .game-pad strong { display: block; font-size: 19px; letter-spacing: 0; }
    .game-pad span { display: block; margin-top: 7px; color: rgba(255,255,255,.78); font-size: 13px; }
    .stat-row { display: grid; grid-template-columns: repeat(3, 1fr); margin: 12px 16px 0; background: var(--surface-2); border: 1px solid #edf2f6; border-radius: 8px; }
    .stat { text-align: center; padding: 11px 4px; }
    .stat strong { display: block; font-size: 17px; }
    .stat span { display: block; color: var(--muted); font-size: 11px; margin-top: 2px; }
    .game-actions { padding: 0 16px 16px; }
    .chart { height: 182px; display: flex; align-items: flex-end; gap: 10px; padding: 16px 0 2px; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; min-width: 0; }
    .bar-track { width: 25px; height: 132px; border-radius: 999px; overflow: hidden; background: #e8eef4; display: flex; align-items: flex-end; }
    .bar-fill { width: 100%; border-radius: 999px; background: linear-gradient(180deg, var(--primary-2), var(--primary)); }
    .empty { text-align: center; padding: 28px 16px; }
    .empty .bubble { margin: 0 auto 12px; color: var(--muted); background: #f0f4f7; }
    .empty h3 { margin: 0; font-size: 17px; }
    .empty p { margin: 8px 0 0; color: var(--muted); font-size: 13px; line-height: 1.55; }
    .nav { position: fixed; left: 12px; width: calc(min(100vw, 390px) - 24px); bottom: 12px; bottom: calc(12px + env(safe-area-inset-bottom)); min-height: 68px; border-radius: 8px; background: rgba(255,255,255,.96); border: 1px solid #e5edf4; box-shadow: 0 16px 36px rgba(18,32,51,.16); display: grid; grid-template-columns: repeat(5, 1fr); z-index: 20; backdrop-filter: blur(12px); }
    .nav button { background: transparent; color: #8997a9; font-size: 11px; font-weight: 950; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; min-width: 0; }
    .nav .icon { width: 21px; height: 21px; }
    .nav .active { color: var(--primary); }
    .modal { position: fixed; inset: 0; z-index: 40; display: none; align-items: flex-end; background: rgba(18,32,51,.42); }
    .modal.show { display: flex; }
    .sheet { width: min(100vw, 390px); max-height: 88vh; margin: 0; padding: 10px 18px 22px; background: #fff; border-radius: 8px 8px 0 0; overflow: auto; box-shadow: 0 -18px 34px rgba(18,32,51,.16); }
    .handle { width: 42px; height: 5px; border-radius: 999px; background: #d4dce5; margin: 0 auto 14px; }
    .sheet-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 10px; }
    .sheet-head h3 { margin: 0; font-size: 20px; font-weight: 950; letter-spacing: 0; }
    .sheet-head p { margin: 4px 0 0; color: var(--muted); font-size: 12px; line-height: 1.45; }
    .close { width: 38px; height: 38px; border-radius: 8px; display: grid; place-items: center; background: #f1f5f8; color: var(--text); }
    .detail { color: var(--muted); font-size: 14px; line-height: 1.75; margin-bottom: 12px; }
    .toast { position: fixed; left: 18px; width: calc(min(100vw, 390px) - 36px); bottom: 92px; z-index: 60; padding: 12px 14px; border-radius: 8px; background: #172033; color: #fff; font-size: 14px; line-height: 1.45; opacity: 0; pointer-events: none; transform: translateY(140px); transition: .24s ease; box-shadow: 0 12px 28px rgba(18,32,51,.22); }
    .toast.show { opacity: 1; transform: translateY(0); }
    .menu { width: 100%; display: flex; align-items: center; gap: 12px; padding: 13px 0; border-bottom: 1px solid #eef3f7; background: transparent; text-align: left; }
    .menu:last-child { border-bottom: 0; }
    @media (min-width: 500px) {
      .app, .login-screen { margin: 0 auto; box-shadow: 0 0 0 1px #cad5df; }
      .nav { left: 50%; transform: translateX(-50%); }
      .sheet { margin: 0 auto; }
      .toast { left: 50%; transform: translate(-50%, 140px); }
      .toast.show { transform: translate(-50%, 0); }
    }
  </style>
</head>
<body>
  <div id="app" class="app"></div>

  <div id="toast" class="toast"></div>

  <script>
    const STORAGE_KEY = 'jkshz_state_v4';
    const date = new Date();
    const todayText = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    const weekday = ['周日','周一','周二','周三','周四','周五','周六'][date.getDay()];
    const defaultUser = { name: '张医生', role: '康复师', email: 'doctor@jiankang.app' };
    const seed = {

      ],

      ],

      ],

    };

    let state = load();
    let activeModal = null;
    let toastTimer = null;
    let gameTimer = null;

    function clone(value) { return JSON.parse(JSON.stringify(value)); }
    function load() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (!saved) return clone(seed);
        return { ...clone(seed), ...saved, settings: { ...seed.settings, ...(saved.settings || {}) }, game: { ...seed.game, ...(saved.game || {}) } };
      } catch (_) {
        return clone(seed);
      }
    }
    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
    function uid(prefix) { return `${prefix}_${Date.now()}_${Math.floor(Math.random() * 1000)}`; }
    function esc(value) { return String(value ?? '').replace(/[&<>"']/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m])); }
    function clamp(value, min = 0, max = 100) { return Math.max(min, Math.min(max, Number(value) || 0)); }
    function avg(list, key) { return list.length ? Math.round(list.reduce((sum, item) => sum + (Number(item[key]) || 0), 0) / list.length) : 0; }
    function scoreAssessment(grip, rom, pain, adl) { return clamp(Math.round(Number(grip) * 1.2 + Number(rom) * .35 + Number(adl) * .35 - Number(pain) * 4)); }
    function val(id) { return document.getElementById(id)?.value || ''; }
    function svg(body) { return `<svg class="icon" viewBox="0 0 24 24" aria-hidden="true">${body}</svg>`; }
    const ICONS = {
      heart: svg('<path d="M19.5 12.6 12 20l-7.5-7.4a5 5 0 0 1 7.1-7.1l.4.4.4-.4a5 5 0 1 1 7.1 7.1Z"/><path d="M8 13h2l1.3-3 2.2 6 1.5-3h2"/>'),

      device: svg('<rect x="7" y="3" width="10" height="18" rx="2"/><path d="M10 7h4M11 17h2"/>'),
      training: svg('<path d="M6 12h12"/><path d="M8 8v8"/><path d="M16 8v8"/><path d="M4 10v4"/><path d="M20 10v4"/>'),
      data: svg('<path d="M4 19V5"/><path d="M4 19h16"/><path d="M8 16v-5"/><path d="M12 16V8"/><path d="M16 16v-7"/>'),
      user: svg('<circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/>'),
      users: svg('<circle cx="9" cy="8" r="3"/><path d="M3 20a6 6 0 0 1 12 0"/><path d="M16 10a3 3 0 0 1 0 6"/><path d="M18 20a5 5 0 0 0-3-4"/>'),
      clipboard: svg('<rect x="5" y="4" width="14" height="17" rx="2"/><path d="M9 4a3 3 0 0 1 6 0v2H9Z"/><path d="M9 12h6M9 16h4"/>'),
      rx: svg('<path d="M9 3h6v5l3 4v7a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2v-7l3-4Z"/><path d="M9 8h6"/><path d="M10 15h4M12 13v4"/>'),
      play: svg('<circle cx="12" cy="12" r="9"/><path d="m10 8 6 4-6 4Z"/>'),
      report: svg('<path d="M7 3h7l4 4v14H7Z"/><path d="M14 3v5h5"/><path d="M10 13h5M10 17h5"/>'),
      plus: svg('<path d="M12 5v14M5 12h14"/>'),
      bell: svg('<path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9"/><path d="M10 21h4"/>'),
      hand: svg('<path d="M8 13V6a2 2 0 0 1 4 0v6"/><path d="M12 12V5a2 2 0 0 1 4 0v8"/><path d="M16 13V8a2 2 0 0 1 4 0v6a7 7 0 0 1-14 0v-2a2 2 0 1 1 4 0"/>'),
      radio: svg('<path d="M4 12a8 8 0 0 1 16 0"/><path d="M8 12a4 4 0 0 1 8 0"/><circle cx="12" cy="12" r="1"/><path d="M12 13v7"/>'),
      pulse: svg('<path d="M3 12h4l2-7 4 14 2-7h6"/>'),
      folder: svg('<path d="M3 7h7l2 2h9v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/>'),
      lock: svg('<rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/>'),
      trash: svg('<path d="M4 7h16"/><path d="M10 11v6M14 11v6"/><path d="M6 7l1 14h10l1-14"/><path d="M9 7V4h6v3"/>'),
      info: svg('<circle cx="12" cy="12" r="9"/><path d="M12 11v5M12 8h.01"/>'),
      close: svg('<path d="M6 6l12 12M18 6 6 18"/>'),
      check: svg('<path d="m5 12 4 4L19 6"/>'),
      sync: svg('<path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 16v5h5M21 8V3h-5"/>')
    };
    function icon(name) { return ICONS[name] || ICONS.info; }
    function toast(text) {
      const el = document.getElementById('toast');
      el.textContent = text;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
    }
    function confirmDo(message, fn) { if (window.confirm(message)) fn(); }
    function setTab(tab) { state.tab = tab; save(); render(); }
    function setTraining(tab) { state.trainingTab = tab; save(); render(); }
    function setData(tab) { state.dataTab = tab; save(); render(); }

    function login() {
      const email = document.getElementById('loginEmail')?.value.trim();
      const password = document.getElementById('loginPassword')?.value.trim();
      if (!email || !password) { toast('请输入账号和密码。'); return; }
      state.user = { ...defaultUser, email }; save(); render(); toast('已进入健康守护者。');
    }
    function logout() { state.user = null; save(); render(); }
    function resetData() { confirmDo('确认恢复默认数据？', () => { const user = state.user || defaultUser; state = clone(seed); state.user = user; save(); render(); toast('数据已恢复。'); }); }
    function deleteAccount() { confirmDo('确认注销账号并删除当前数据？', () => { localStorage.removeItem(STORAGE_KEY); state = clone(seed); activeModal = null; render(); }); }

    function section(title, subtitle, action, handler) {
      return `<div class="section"><div><h3>${esc(title)}</h3>${subtitle ? `<p>${esc(subtitle)}</p>` : ''}</div>${action ? `<button class="text-action" onclick="${handler}">${esc(action)} ›</button>` : ''}</div>`;
    }
    function metric(iconName, value, label, caption, color = 'var(--primary)', bg = 'var(--cyan-soft)') {
      return `<div class="card metric"><div class="bubble" style="color:${color};background:${bg}">${icon(iconName)}</div><strong>${esc(value)}</strong><span>${esc(label)}</span><small>${esc(caption)}</small></div>`;
    }
    function empty(iconName, title, caption, action, handler) {
      return `<div class="card empty"><div class="bubble">${icon(iconName)}</div><h3>${esc(title)}</h3><p>${esc(caption)}</p>${action ? `<div class="actions"><button class="btn ghost" onclick="${handler}">${icon('plus')}${esc(action)}</button></div>` : ''}</div>`;
    }
    function nav() {
      const items = [['workbench','home','工作台'], ['device','device','设备'], ['training','training','训练'], ['data','data','数据'], ['profile','user','我的']];
      return `<nav class="nav">${items.map(([key, ico, label]) => `<button class="${state.tab === key ? 'active' : ''}" onclick="setTab('${key}')">${icon(ico)}${label}</button>`).join('')}</nav>`;
    }
    function shell(html) { return `<main class="screen">${html}</main>${nav()}`; }
    function patientOptions(selected = '') { return state.patients.map((p) => `<option value="${esc(p.name)}" ${selected === p.name ? 'selected' : ''}>${esc(p.name)}</option>`).join(''); }

    function renderLogin() {
      return `<main class="login-screen"><div class="login-wrap">
        <div class="brand"><div class="brand-mark">${icon('heart')}</div><h1>健康守护者</h1><p>智能手部康复训练与数据管理平台</p></div>
        <div class="card glass-card">
          <div class="field"><label>账号</label><input id="loginEmail" type="email" autocomplete="email" placeholder="请输入邮箱账号"></div>
          <div class="field"><label>密码</label><input id="loginPassword" type="password" autocomplete="current-password" placeholder="请输入登录密码"></div>
          <div class="actions"><button class="btn" onclick="login()">${icon('play')}登录账号</button></div>
          <p class="meta" style="text-align:center;margin:12px 0 0">登录后进入工作台，统一管理患者档案、设备状态、康复评估、训练处方和报告分析。</p>
        </div>
      </div></main>`;
    }

    function renderWorkbench() {
      const online = state.devices.filter((d) => d.status === 'online').length;
      const completion = avg(state.records, 'completion');
      const score = state.assessments[0]?.score || 0;
      return shell(`
        <div class="app-header"><div><div class="kicker">${todayText}  ${weekday}</div><h2>你好，${esc(state.user.name)}</h2></div><button class="icon-btn" onclick="openModal('about')">${icon('bell')}</button></div>
        <section class="hero"><div class="hero-content"><small>今日康复概览</small><h1>重点患者 ${state.patients.length} 位，设备在线 ${online} 台</h1><p>请优先完成复评任务，更新训练记录后生成阶段报告。</p><div class="hero-stats"><div class="hero-stat"><strong>${score}</strong><span>综合评分</span></div><div class="hero-stat"><strong>${completion}%</strong><span>完成率</span></div><div class="hero-stat"><strong>${state.reports.length}</strong><span>报告</span></div></div></div></section>
        <div class="grid">${metric('users', state.patients.length, '患者', '在管人数')}${metric('device', `${online}/${state.devices.length}`, '设备', '在线状态', 'var(--blue)', '#edf5ff')}${metric('clipboard', score, '最新评分', '综合评估', 'var(--green)', 'var(--green-soft)')}${metric('training', `${completion}%`, '训练完成率', '训练记录', 'var(--yellow)', 'var(--yellow-soft)')}</div>
        ${section('快捷操作', '评估、处方、训练和报告一键进入')}
        <div class="grid">
          <button class="quick" onclick="openModal('assessment')"><div class="bubble">${icon('clipboard')}</div><div class="title">新建评估</div><div class="meta">记录握力、活动度和疼痛评分</div></button>
          <button class="quick" onclick="openModal('prescription')"><div class="bubble" style="color:var(--green);background:var(--green-soft)">${icon('rx')}</div><div class="title">生成处方</div><div class="meta">根据训练重点生成方案</div></button>
          <button class="quick" onclick="setTab('training');setTraining('game')"><div class="bubble" style="color:var(--yellow);background:var(--yellow-soft)">${icon('training')}</div><div class="title">开始训练</div><div class="meta">进入互动抓握任务</div></button>
          <button class="quick" onclick="setTab('data');setData('reports')"><div class="bubble" style="color:var(--purple);background:var(--purple-soft)">${icon('report')}</div><div class="title">康复报告</div><div class="meta">查看阶段进展总结</div></button>
        </div>
        ${section('今日任务')}
        <div class="card">${state.tasks.map((t) => `<button class="task" onclick="toggleTask('${t.id}')"><span class="check ${t.done ? 'done' : ''}">${t.done ? icon('check') : ''}</span><span class="grow"><span class="title" style="${t.done ? 'text-decoration:line-through;color:var(--muted)' : ''}">${esc(t.title)}</span><span class="meta">${esc(t.meta)}</span></span><span class="badge ${t.priority === '高' ? 'warn' : ''}">${esc(t.priority)}</span></button>`).join('')}</div>
        ${section('患者概览', '', '查看全部', "setTab('training');setTraining('patients')")}
        ${state.patients.slice(0, 2).map(patientCard).join('') || empty('users', '暂无患者档案', '先建立患者档案，再录入评估和训练处方。', '新增患者', "openModal('patient')")}
      `);
    }
    function toggleTask(id) { state.tasks = state.tasks.map((t) => t.id === id ? { ...t, done: !t.done } : t); save(); render(); }

    function renderDevice() {
      const online = state.devices.filter((d) => d.status === 'online').length;
      const avgBattery = avg(state.devices, 'battery');
      return shell(`
        <div class="page-head"><div><h2>设备管理</h2><p>在线 ${online} 台 · 共 ${state.devices.length} 台设备</p></div><button class="icon-btn" onclick="openModal('device')">${icon('plus')}</button></div>
        <div class="card"><div class="grid" style="gap:0"><div style="text-align:center"><strong style="font-size:22px">${online}</strong><div class="meta">在线设备</div></div><div style="text-align:center"><strong style="font-size:22px">${avgBattery}%</strong><div class="meta">平均电量</div></div></div></div>
        ${state.devices.length ? state.devices.map(deviceCard).join('') : empty('device', '暂无设备', '添加康复手套、角度传感器或肌电设备后，可查看状态。', '添加设备', "openModal('device')")}
      `);
    }
    function deviceIcon(type) { return type === '肌电设备' ? 'pulse' : type === '角度传感器' ? 'radio' : 'hand'; }
    function deviceCard(d) {
      const online = d.status === 'online';
      const batteryColor = d.battery > 60 ? 'var(--green)' : d.battery > 30 ? 'var(--yellow)' : 'var(--red)';
      return `<div class="card">
        <div class="row"><div class="bubble">${icon(deviceIcon(d.type))}</div><div class="grow"><div class="title">${esc(d.name)}</div><div class="meta">${esc(d.type)} · 绑定：${esc(d.patient)}</div></div><span class="badge ${online ? '' : 'off'}">${online ? '在线' : '待连接'}</span></div>
        <div class="grid" style="margin-top:14px"><div><div class="meta">电量</div><strong style="color:${batteryColor};font-size:18px">${d.battery}%</strong><div class="progress"><i style="width:${clamp(d.battery)}%;background:${batteryColor}"></i></div></div><div><div class="meta">信号</div><strong style="font-size:18px">${d.signal}%</strong><div class="progress"><i style="width:${clamp(d.signal)}%;background:${online ? 'var(--blue)' : '#bdc7d1'}"></i></div></div></div>
        <div class="actions tight"><button class="btn ghost small" onclick="syncDevice('${d.id}')">${icon('sync')}同步</button><button class="btn ghost small" onclick="removeDevice('${d.id}')">${icon('trash')}删除</button><button class="btn ${online ? 'ghost' : ''} small" onclick="toggleDevice('${d.id}')">${online ? '断开' : '连接'}</button></div>
      </div>`;
    }
    function syncDevice(id) { state.devices = state.devices.map((d) => d.id === id ? { ...d, signal: d.status === 'online' ? 96 : d.signal, lastSync: '刚刚' } : d); save(); render(); toast('设备数据已同步。'); }
    function toggleDevice(id) { state.devices = state.devices.map((d) => d.id === id ? { ...d, status: d.status === 'online' ? 'standby' : 'online', signal: d.status === 'online' ? 18 : 88, lastSync: d.status === 'online' ? d.lastSync : '刚刚' } : d); save(); render(); }
    function removeDevice(id) { confirmDo('确认删除这台设备？', () => { state.devices = state.devices.filter((d) => d.id !== id); save(); render(); }); }

    function renderTraining() {
      const tabs = [['patients','患者'], ['assessment','评估'], ['prescription','处方'], ['game','游戏训练']];
      const body = state.trainingTab === 'patients' ? renderPatients() : state.trainingTab === 'assessment' ? renderAssessments() : state.trainingTab === 'prescription' ? renderPrescriptions() : renderGame();
      return shell(`<div class="page-head"><div><h2>训练中心</h2><p>患者建档、评估、处方、互动训练</p></div></div><div class="tabs">${tabs.map(([k, t]) => `<button class="tab ${state.trainingTab === k ? 'active' : ''}" onclick="setTraining('${k}')">${esc(t)}</button>`).join('')}</div>${body}`);
    }
    function patientCard(p) {
      return `<div class="card"><div class="row"><div class="bubble">${icon('user')}</div><div class="grow"><div class="title">${esc(p.name)}</div><div class="meta">${esc(p.age)}岁 · ${esc(p.diagnosis)}</div></div><span class="badge ${p.risk === '中风险' ? 'warn' : ''}">${p.risk === '中风险' ? '中风险' : '低风险'}</span></div><div class="info-grid"><div class="info"><span>患侧</span><strong>${esc(p.side)}</strong></div><div class="info"><span>阶段</span><strong>${esc(p.stage)}</strong></div><div class="info"><span>下次安排</span><strong>${esc(p.next)}</strong></div><div class="info"><span>进展</span><strong>${clamp(p.progress)}%</strong></div></div>${state.tab === 'training' ? `<div class="actions"><button class="btn ghost" onclick="removePatient('${p.id}')">${icon('trash')}删除档案</button></div>` : ''}</div>`;
    }
    function renderPatients() { return `${section('患者档案', '', '新增', "openModal('patient')")}${state.patients.length ? state.patients.map(patientCard).join('') : empty('users', '暂无患者档案', '先建立患者档案，再录入评估和训练处方。', '新增患者', "openModal('patient')")}`; }
    function removePatient(id) { confirmDo('确认删除这个患者基础档案？历史评估、训练和报告会保留。', () => { state.patients = state.patients.filter((p) => p.id !== id); save(); render(); }); }
    function renderAssessments() {
      return `${section('评估记录', '', '新建评估', "openModal('assessment')")}${state.assessments.length ? state.assessments.map((a) => `<div class="card"><div class="space"><div><div class="title">${esc(a.patient)}</div><div class="meta">${esc(a.date)} · 综合评分</div></div><div class="bubble" style="background:var(--primary);color:#fff">${a.score}</div></div><div class="info-grid"><div class="info"><span>握力</span><strong>${a.grip}kg</strong></div><div class="info"><span>活动度</span><strong>${a.rom}%</strong></div><div class="info"><span>疼痛</span><strong>${a.pain}/10</strong></div><div class="info"><span>ADL</span><strong>${a.adl}%</strong></div></div><p class="meta" style="margin-top:10px">${esc(a.note)}</p></div>`).join('') : empty('clipboard', '暂无评估记录', '新建评估后会自动计算综合评分。', '新建评估', "openModal('assessment')")}`;
    }
    function renderPrescriptions() {
      return `${section('康复处方', '', '智能生成', "openModal('prescription')")}${state.prescriptions.length ? state.prescriptions.map((r) => `<div class="card"><div class="space"><div class="grow"><div class="title">${esc(r.title)}</div><div class="meta">${esc(r.patient)} · ${esc(r.focus)}</div></div><span class="badge ${r.status === '执行中' ? '' : 'warn'}">${esc(r.status)}</span></div><div class="info-grid"><div class="info"><span>强度</span><strong>${esc(r.intensity)}</strong></div><div class="info"><span>频次</span><strong>${esc(r.frequency)}</strong></div><div class="info"><span>时长</span><strong>${esc(r.duration)}</strong></div><div class="info"><span>状态</span><strong>${esc(r.status)}</strong></div></div><div class="actions"><button class="btn ${r.status === '执行中' ? 'ghost' : 'green'}" onclick="toggleRx('${r.id}')">${r.status === '执行中' ? '暂停处方' : '开始执行'}</button></div></div>`).join('') : empty('rx', '暂无康复处方', '可根据评估结果生成训练处方。', '生成处方', "openModal('prescription')")}`;
    }
    function toggleRx(id) { state.prescriptions = state.prescriptions.map((r) => r.id === id ? { ...r, status: r.status === '执行中' ? '已暂停' : '执行中' } : r); save(); render(); }
    function renderGame() {
      const g = state.game;
      if (!state.patients.find((p) => p.name === g.patient) && state.patients[0]) g.patient = state.patients[0].name;
      return `${section('互动抓握训练', '点击训练区模拟握力采集，结束后自动生成训练记录')}<div class="card game-card"><div class="game-top"><div class="space"><div><div class="title">${esc(g.patient || '未选择患者')}</div><div class="meta">本轮剩余 ${g.left}s · 已记录 ${state.records.length} 条</div></div><div class="bubble" style="background:var(--cyan-soft)">${g.score}</div></div><div class="field" style="margin-top:12px"><label>患者</label><select onchange="state.game.patient=this.value;save()" value="${esc(g.patient)}">${patientOptions(g.patient)}</select></div></div><div class="game-pad" onclick="tapGrip()">${icon('hand')}<strong>${g.running ? '点击模拟一次有效抓握' : '点击开始后进行训练'}</strong><span>实时握力 ${g.grip}% · 连续 ${g.combo} 次</span></div><div class="stat-row"><div class="stat"><strong>${g.left}s</strong><span>剩余</span></div><div class="stat"><strong>${g.best}</strong><span>最佳</span></div><div class="stat"><strong>${g.duration}s</strong><span>时长</span></div></div><div class="actions game-actions"><button class="btn green" onclick="startGame()">开始训练</button><button class="btn ghost" onclick="pauseGame()">暂停</button><button class="btn ghost" onclick="finishGame()">完成本轮</button></div></div>`;
    }
    function startGame() {
      clearInterval(gameTimer);
      state.game = { ...state.game, left: 30, duration: 30, running: true, score: 0, grip: 0, combo: 0, patient: state.game.patient || state.patients[0]?.name || '未命名' };
      save(); render();
      gameTimer = setInterval(() => {
        if (!state.game.running) return;
        state.game.left -= 1;
        if (state.game.left <= 0) finishGame();
        save(); render();
      }, 1000);
    }
    function pauseGame() { state.game.running = false; clearInterval(gameTimer); save(); render(); }
    function tapGrip() {
      if (!state.game.running) { toast('请先点击开始训练。'); return; }
      const gain = Math.floor(5 + Math.random() * 9);
      state.game.grip = clamp(35 + gain * 6 + state.game.combo * 2);
      state.game.combo += 1;
      state.game.score = clamp(state.game.score + gain, 0, 120);
      save(); render();
    }
    function finishGame() {
      if (!state.game.running && state.game.score === 0) { toast('请先开始训练。'); return; }
      clearInterval(gameTimer);
      const g = state.game;
      state.game.running = false;
      state.game.left = Math.max(0, g.left);
      state.game.best = Math.max(g.best, g.score);
      state.records = [{ id: uid('r'), patient: g.patient, type: '抓握游戏', date: todayText, duration: 1, completion: clamp(Math.round(g.score / 30 * 12)), score: clamp(g.score) }, ...state.records];
      save(); render(); toast('训练结束，记录已生成。');
    }

    function renderData() {
      const tabs = [['records','记录'], ['reports','报告'], ['analytics','分析'], ['storage','仓储']];
      const body = state.dataTab === 'records' ? renderRecords() : state.dataTab === 'reports' ? renderReports() : state.dataTab === 'analytics' ? renderAnalytics() : renderStorage();
      return shell(`<div class="page-head"><div><h2>数据中心</h2><p>训练记录、康复报告与趋势分析</p></div></div><div class="tabs">${tabs.map(([k, t]) => `<button class="tab ${state.dataTab === k ? 'active' : ''}" onclick="setData('${k}')">${esc(t)}</button>`).join('')}</div>${body}`);
    }
    function renderRecords() {
      return `${section('训练记录', '', '新增', "openModal('record')")}${state.records.length ? state.records.map((r) => `<div class="card"><div class="space"><div><div class="title">${esc(r.patient)}</div><div class="meta">${esc(r.type)} · ${esc(r.date)}</div></div><strong style="color:var(--primary);font-size:20px">${r.score}分</strong></div><div class="row" style="margin-top:12px"><span class="meta">训练 ${r.duration} 分钟</span><div class="grow"><div class="progress"><i style="width:${clamp(r.completion)}%;background:var(--green)"></i></div></div><span class="meta">${r.completion}%</span></div><div class="actions"><button class="btn ghost" onclick="removeRecord('${r.id}')">${icon('trash')}删除记录</button></div></div>`).join('') : empty('data', '暂无训练记录', '新增训练记录或完成互动训练后会自动展示。', '新增记录', "openModal('record')")}`;
    }
    function removeRecord(id) { confirmDo('确认删除这条训练记录？', () => { state.records = state.records.filter((r) => r.id !== id); save(); render(); }); }
    function renderReports() {
      return `${section('康复报告', '', '生成', "openModal('report')")}${state.reports.length ? state.reports.map((r) => `<div class="card"><div class="space"><div class="grow"><div class="title">${esc(r.title)}</div><div class="meta">${esc(r.patient)} · ${esc(r.date)}</div></div><span class="badge ${r.status === '待复核' ? 'warn' : ''}">${esc(r.status)}</span></div><p class="detail" style="margin:10px 0 0">${esc(r.summary)}</p><div class="actions tight"><button class="btn ghost" onclick="viewReport('${r.id}')">查看</button><button class="btn" onclick="exportReport('${r.id}')">导出</button><button class="btn ghost" onclick="removeReport('${r.id}')">${icon('trash')}删除</button></div></div>`).join('') : empty('report', '暂无康复报告', '可根据当前训练记录生成阶段报告。', '生成报告', "openModal('report')")}`;
    }
    function viewReport(id) { activeModal = { type: 'viewReport', report: state.reports.find((r) => r.id === id) }; renderModal(); }
    function exportReport(id) {
      const r = state.reports.find((item) => item.id === id);
      if (!r) return;
      const blob = new Blob([`${r.title}\n患者：${r.patient}\n日期：${r.date}\n状态：${r.status}\n\n${r.summary}`], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `${r.title}.txt`;
      link.click();
      URL.revokeObjectURL(url);
      toast('报告已导出。');
    }
    function removeReport(id) { confirmDo('确认删除这份报告？', () => { state.reports = state.reports.filter((r) => r.id !== id); save(); render(); }); }
    function renderAnalytics() {
      const avgScore = avg(state.records, 'score');
      const avgCompletion = avg(state.records, 'completion');
      const totalMinutes = state.records.reduce((sum, r) => sum + Number(r.duration || 0), 0);
      const chart = state.records.slice(0, 5).reverse();
      return `${section('趋势分析', '根据当前训练记录实时汇总')}<div class="grid">${metric('data', avgScore, '平均分', '训练表现')}${metric('clipboard', `${avgCompletion}%`, '完成率', '任务完成', 'var(--green)', 'var(--green-soft)')}${metric('training', totalMinutes, '总时长', '分钟', 'var(--yellow)', 'var(--yellow-soft)')}${metric('report', state.reports.length, '报告', '已生成', 'var(--purple)', 'var(--purple-soft)')}</div><div class="card"><div class="title">近 5 次训练得分</div>${chart.length ? `<div class="chart">${chart.map((r) => `<div class="bar-col"><div class="bar-track"><div class="bar-fill" style="height:${clamp(r.score)}%"></div></div><span class="meta">${esc(r.patient.slice(0, 1))}</span></div>`).join('')}</div>` : `<p class="meta">暂无可分析的训练记录。</p>`}</div>`;
    }
    function renderStorage() {
      const filters = ['全部', '模板', '数据', '文档'];
      const list = state.storage.filter((s) => state.storageFilter === '全部' || s.type === state.storageFilter);
      return `${section('数据仓储', '原始数据、模板与归档文档')}<div class="tabs">${filters.map((f) => `<button class="tab ${state.storageFilter === f ? 'active' : ''}" onclick="state.storageFilter='${f}';save();render()">${f}</button>`).join('')}</div>${list.map((s) => `<div class="card"><div class="row"><div class="bubble">${icon(s.type === '数据' ? 'data' : s.type === '模板' ? 'clipboard' : 'folder')}</div><div class="grow"><div class="title">${esc(s.title)}</div><div class="meta">${esc(s.type)} · ${esc(s.owner)} · ${esc(s.updated)}</div></div><strong class="meta">${esc(s.size)}</strong></div></div>`).join('')}`;
    }

    function renderProfile() {
      return shell(`<section class="hero" style="text-align:center;min-height:auto"><div class="hero-content"><div class="brand-mark" style="width:74px;height:74px;background:#fff;color:var(--primary);box-shadow:none">${icon('user')}</div><h1 style="max-width:none">${esc(state.user.name)}</h1><p style="max-width:none">${esc(state.user.role)} · 健康守护者</p></div></section>
        ${section('账号服务')}<div class="card">${menu('个人资料', '姓名、身份与联系方式', "openModal('profile')", 'user')}${menu('数据管理', '患者、设备、训练与报告统一管理', "toast('当前数据已更新。')", 'data')}${menu('恢复默认数据', '恢复默认患者、设备和记录', 'resetData()', 'sync')}</div>
        ${section('系统设置')}<div class="card">${toggleRow('康复提醒通知', 'notification')}${toggleRow('训练数据自动同步', 'sync')}${toggleRow('隐私保护模式', 'privacy')}</div>
        ${section('合规与更多')}<div class="card">${menu('关于应用', '版本、版权与系统说明', "openModal('about')", 'info')}${menu('隐私政策', '查看信息收集、保存和删除说明', "openModal('privacy')", 'lock')}${menu('用户协议', '查看服务范围和健康提示', "openModal('agreement')", 'report')}${menu('注销账号与删除数据', '删除当前账号和相关数据', 'deleteAccount()', 'trash', true)}${menu('退出登录', '返回登录页', 'logout()', 'close', true)}</div>`);
    }
    function menu(title, caption, handler, iconName, danger = false) {
      return `<button class="menu" onclick="${handler}"><div class="bubble" style="${danger ? 'color:var(--red);background:var(--red-soft)' : ''}">${icon(iconName)}</div><div class="grow"><div class="title" style="${danger ? 'color:var(--red)' : ''}">${esc(title)}</div><div class="meta">${esc(caption)}</div></div></button>`;
    }
    function toggleRow(label, key) {
      return `<label class="menu" style="margin:0"><div class="grow"><div class="title">${esc(label)}</div></div><input type="checkbox" ${state.settings[key] ? 'checked' : ''} onchange="state.settings.${key}=this.checked;save()" style="width:24px;min-height:24px"></label>`;
    }

    function openModal(type) { activeModal = { type }; renderModal(); }
    function closeModal() { activeModal = null; renderModal(); }
    function modalBase(title, subtitle, body) {
      return `<div class="sheet"><div class="handle"></div><div class="sheet-head"><div><h3>${title}</h3>${subtitle ? `<p>${subtitle}</p>` : ''}</div><button class="close" onclick="closeModal()">${icon('close')}</button></div>${body}</div>`;
    }
    function renderModal() {
      const host = document.getElementById('modal');
      if (!activeModal) { host.classList.remove('show'); host.innerHTML = ''; return; }
      const content = modalContent(activeModal.type);
      host.innerHTML = modalBase(content.title, content.subtitle, content.body);
      host.classList.add('show');
    }
    function modalContent(type) {
      if (type === 'device') return { title: '添加设备', subtitle: '录入设备后自动加入管理列表', body: `<div class="field"><label>设备名称</label><input id="deviceName" placeholder="例如：智能握力手套 A02"></div><div class="field"><label>设备类型</label><select id="deviceType"><option>康复手套</option><option>角度传感器</option><option>肌电设备</option></select></div><div class="field"><label>绑定患者</label><input id="devicePatient" placeholder="可暂不填写"></div><div class="actions"><button class="btn" onclick="addDevice()">保存设备</button></div>` };
      if (type === 'patient') return { title: '新增患者', subtitle: '建立患者基础档案', body: `<div class="field"><label>姓名</label><input id="patientName" placeholder="请输入患者姓名"></div><div class="field"><label>年龄</label><input id="patientAge" type="number" placeholder="请输入年龄"></div><div class="field"><label>诊断类型</label><select id="patientDiagnosis"><option>脑卒中恢复期</option><option>腕关节术后</option><option>帕金森</option><option>骨折术后</option></select></div><div class="field"><label>患侧</label><select id="patientSide"><option>右手</option><option>左手</option><option>双手</option></select></div><div class="field"><label>联系方式</label><input id="patientPhone" placeholder="可选"></div><div class="actions"><button class="btn" onclick="addPatient()">保存档案</button></div>` };
      if (type === 'assessment') return { title: '新建康复评估', subtitle: '录入关键指标后自动计算综合评分', body: `<div class="field"><label>患者</label><select id="assPatient">${patientOptions(state.patients[0]?.name)}</select></div><div class="field"><label>握力 kg</label><input id="assGrip" type="number" value="20"></div><div class="field"><label>关节活动度 %</label><input id="assRom" type="number" value="60"></div><div class="field"><label>疼痛评分</label><input id="assPain" type="number" value="2"></div><div class="field"><label>日常生活能力 %</label><input id="assAdl" type="number" value="70"></div><div class="field"><label>备注</label><textarea id="assNote" placeholder="可选"></textarea></div><div class="actions"><button class="btn" onclick="addAssessment()">保存评估</button></div>` };
      if (type === 'prescription') return { title: '智能生成处方', subtitle: '生成结果需康复师复核后执行', body: `<div class="field"><label>患者</label><select id="rxPatient">${patientOptions(state.patients[0]?.name)}</select></div><div class="field"><label>训练重点</label><select id="rxFocus"><option>抓握稳定性</option><option>手指分离</option><option>腕部活动度</option><option>精细动作</option></select></div><div class="field"><label>训练强度</label><select id="rxIntensity"><option>中等</option><option>轻柔</option><option>进阶</option></select></div><div class="field"><label>单次时长（分钟）</label><input id="rxDuration" type="number" value="15"></div><div class="actions"><button class="btn" onclick="addPrescription()">生成处方</button></div>` };
      if (type === 'record') return { title: '新增训练记录', subtitle: '手动补录线下训练数据', body: `<div class="field"><label>患者</label><input id="recordPatient" value="${esc(state.patients[0]?.name || '李明')}"></div><div class="field"><label>训练类型</label><input id="recordType" value="抓握训练"></div><div class="field"><label>训练时长（分钟）</label><input id="recordDuration" type="number" value="15"></div><div class="field"><label>训练得分</label><input id="recordScore" type="number" value="80"></div><div class="actions"><button class="btn" onclick="addRecord()">保存记录</button></div>` };
      if (type === 'report') return { title: '生成康复报告', subtitle: '阶段报告可用于复核与归档', body: `<div class="field"><label>患者</label><input id="reportPatient" value="${esc(state.patients[0]?.name || '李明')}"></div><div class="field"><label>报告标题</label><input id="reportTitle" value="阶段康复报告"></div><div class="field"><label>报告摘要</label><textarea id="reportSummary" placeholder="不填写则自动生成摘要"></textarea></div><div class="actions"><button class="btn" onclick="addReport()">生成报告</button></div>` };
      if (type === 'viewReport') {
        const r = activeModal.report;
        return { title: '报告详情', subtitle: r ? `${esc(r.patient)} · ${esc(r.date)}` : '', body: r ? `<div class="title" style="font-size:18px;margin-bottom:12px">${esc(r.title)}</div><p class="detail">${esc(r.summary)}</p><div class="actions"><button class="btn" onclick="closeModal()">关闭</button></div>` : `<p class="detail">报告不存在。</p>` };
      }
      if (type === 'profile') return { title: '编辑资料', subtitle: '更新当前账号信息', body: `<div class="field"><label>姓名</label><input id="profileName" value="${esc(state.user.name)}"></div><div class="field"><label>身份</label><input id="profileRole" value="${esc(state.user.role)}"></div><div class="actions"><button class="btn" onclick="saveProfile()">保存资料</button></div>` };
      if (type === 'privacy') return { title: '隐私政策', subtitle: '隐私与数据说明', body: `<p class="detail">健康守护者会根据功能需要处理账号资料、患者档案、设备状态、评估记录、训练处方、训练记录、康复报告和资料条目。</p><p class="detail">上述数据仅用于提供康复管理、训练记录、趋势分析和报告展示功能，不用于广告画像，不向无关第三方出售。</p><p class="detail">你可以在“我的 - 注销账号与删除数据”中删除当前账号及相关数据。</p>` };
      if (type === 'agreement') return { title: '用户协议', subtitle: '服务范围与健康提示', body: `<p class="detail">健康守护者提供康复过程记录、设备管理、评估数据录入、训练处方生成、互动训练和阶段报告等功能。</p><p class="detail">本应用用于康复管理辅助，不提供医疗诊断，不替代医生、康复师或其他专业医疗人员意见，也不用于紧急医疗服务。</p><p class="detail">用户应确保录入信息真实、合法，并在专业人员指导下进行康复训练和健康决策。</p>` };
      return { title: '关于健康守护者', subtitle: '版本 1.0.0', body: `<p class="detail">健康守护者是一款面向手部康复训练场景的移动端应用，覆盖患者档案、设备管理、评估记录、训练处方、互动训练、数据报告、账号体系和数据删除能力。</p><p class="detail">系统聚焦康复训练过程管理，通过可视化指标、任务提醒和阶段报告帮助康复师更高效地完成日常工作。</p>` };
    }

    function addDevice() {
      const name = val('deviceName').trim();
      if (!name) return toast('请输入设备名称。');
      state.devices = [{ id: uid('d'), name, type: val('deviceType'), status: 'online', battery: 100, signal: 92, patient: val('devicePatient').trim() || '未绑定', lastSync: '刚刚' }, ...state.devices];
      closeModal(); save(); render(); toast('设备已添加。');
    }
    function addPatient() {
      const name = val('patientName').trim();
      const age = val('patientAge').trim();
      if (!name || !age) return toast('请填写姓名和年龄。');
      state.patients = [{ id: uid('p'), name, age, diagnosis: val('patientDiagnosis'), side: val('patientSide'), stage: '第1周', risk: '低风险', next: '待安排', phone: val('patientPhone').trim(), progress: 52 }, ...state.patients];
      closeModal(); save(); render(); toast('患者档案已保存。');
    }
    function addAssessment() {
      const grip = Number(val('assGrip') || 0), rom = Number(val('assRom') || 0), pain = Number(val('assPain') || 0), adl = Number(val('assAdl') || 0);
      state.assessments = [{ id: uid('a'), patient: val('assPatient') || '未命名', date: todayText, grip, rom, pain, adl, score: scoreAssessment(grip, rom, pain, adl), note: val('assNote').trim() || '已完成基础评估，建议结合处方训练。' }, ...state.assessments];
      closeModal(); save(); render(); toast('评估已保存。');
    }
    function addPrescription() {
      const focus = val('rxFocus'), intensity = val('rxIntensity');
      state.prescriptions = [{ id: uid('rx'), patient: val('rxPatient') || '未命名', title: `${focus}训练方案`, intensity, frequency: intensity === '轻柔' ? '每日 3 次' : '每日 2 次', duration: `${val('rxDuration') || 15} 分钟`, status: '待确认', focus }, ...state.prescriptions];
      closeModal(); save(); render(); toast('处方已生成。');
    }
    function addRecord() {
      const score = clamp(val('recordScore'));
      state.records = [{ id: uid('r'), patient: val('recordPatient').trim() || '未命名', type: val('recordType').trim() || '训练记录', date: todayText, duration: Number(val('recordDuration') || 0), completion: clamp(score + 8), score }, ...state.records];
      closeModal(); save(); render(); toast('训练记录已保存。');
    }
    function addReport() {
      state.reports = [{ id: uid('rp'), patient: val('reportPatient').trim() || '未命名', title: val('reportTitle').trim() || '康复报告', date: todayText, status: '已生成', summary: val('reportSummary').trim() || '系统已根据训练记录生成阶段报告，建议结合医生或康复师复核后用于正式归档。' }, ...state.reports];
      closeModal(); save(); render(); toast('康复报告已生成。');
    }
    function saveProfile() {
      state.user = { ...state.user, name: val('profileName').trim() || state.user.name, role: val('profileRole').trim() || state.user.role };
      closeModal(); save(); render(); toast('资料已保存。');
    }

    function render() {
      save();
      const app = document.getElementById('app');
      if (!state.user) {
        app.innerHTML = renderLogin();
        renderModal();
        return;
      }
      if (state.tab === 'device') app.innerHTML = renderDevice();
      else if (state.tab === 'training') app.innerHTML = renderTraining();
      else if (state.tab === 'data') app.innerHTML = renderData();
      else if (state.tab === 'profile') app.innerHTML = renderProfile();
      else app.innerHTML = renderWorkbench();
      renderModal();
    }

    function runAutotest(screen = 'reports') {
      try {
        state = clone(seed);
        state.user = { ...defaultUser };
        state.devices.unshift({ id: uid('d'), name: '智能握力手套 X21', type: '康复手套', status: 'online', battery: 96, signal: 95, patient: '李明', lastSync: '刚刚' });
        state.patients.unshift({ id: uid('p'), name: '赵先生', age: '60', diagnosis: '脑卒中恢复期', side: '右手', stage: '第1周', risk: '低风险', next: '待安排', phone: '', progress: 66 });
        state.assessments.unshift({ id: uid('a'), patient: '赵先生', date: todayText, grip: 20, rom: 70, pain: 2, adl: 72, score: scoreAssessment(20, 70, 2, 72), note: '已完成基础评估，建议结合处方训练。' });
        state.prescriptions.unshift({ id: uid('rx'), patient: '赵先生', title: '抓握稳定性训练方案', intensity: '中等', frequency: '每日 2 次', duration: '15 分钟', status: '执行中', focus: '抓握稳定性' });
        state.records.unshift({ id: uid('r'), patient: '赵先生', type: '抓握游戏', date: todayText, duration: 1, completion: 96, score: 91 });
        state.reports.unshift({ id: uid('rp'), patient: '赵先生', title: '阶段康复报告', date: todayText, status: '已生成', summary: '系统已根据训练记录生成阶段报告，建议结合医生或康复师复核后用于正式归档。' });
        if (screen === 'home') state.tab = 'home';
        else if (screen === 'device') state.tab = 'device';
        else if (screen === 'training') { state.tab = 'training'; state.trainingTab = 'game'; }
        else { state.tab = 'data'; state.dataTab = 'reports'; }
        save();
        render();
        document.body.setAttribute('data-autotest', 'ok');
        document.body.setAttribute('data-scroll-width', document.documentElement.scrollWidth);
        document.body.setAttribute('data-client-width', document.documentElement.clientWidth);
      } catch (error) {
        document.body.setAttribute('data-autotest', 'failed');
        document.body.setAttribute('data-autotest-message', error.message);
      }
    }

    window.addEventListener('beforeunload', () => clearInterval(gameTimer));
    document.getElementById('modal').addEventListener('click', (event) => { if (event.target.id === 'modal') closeModal(); });
    const params = new URLSearchParams(location.search);
    if (params.has('autotest')) runAutotest(params.get('screen') || 'reports');
    else render();
  </script>
</body>
</html>
